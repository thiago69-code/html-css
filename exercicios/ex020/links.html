<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        /* SELETORES PERSONALIZADOS
            #   =   id
            .   =   class
            :   =   pseudo-class
            ::  =   pseudo-element
            >   =   clildren
            
        */
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            color: red;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited{
            color: darkred;
        }
        a:hover{
            color: black;
            text-decoration: underline;
        }
        a:active{
            color: yellow;
        }
        .especial{
            background-color: white;
        }
        .especial::before{
            content: '»';
        }
        .especial::after{
            content: '«';
           
            /*  content: ' [link] ';
            text-decoration: none;
            font-weight: normal;
            color: dark-gray;
            */
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://youtube.com">Site do Youtube</a></li>
        <li><a href="https://facebook.com">Site do Facebook</a></li>
        <li><a href="https://instagram.com" class="especial">Site do Instagram</a></li>
    </ul>
</body>
</html>
