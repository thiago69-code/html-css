<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Parágrafos e quebra de linha</h1>
    <hr>
    <p>Você pode escrever 
        um parágrafo de 
        qualquer jeito.
        Basta colocar tudo <br> 
        no meio do par de tags
        &lt;p&gt; e &lt;/p&gt;
    </p>
    <p>
        Se precisar quebrar 
        o texto em algum lugar
        específico <br> como esse,
        você pode usar a tag br
    </p>
    <p>
        50&cent; <!--símbolos para usar em sites-->
         &#x1F913; <!--emojis para usar em sites !-->
         <!--EMOJIPEDIA.org-->
         <!--&#x '+' (o código do emoji)-->
    </p>
</body>
</html>
